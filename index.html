<!DOCTYPE html>

<head>

  <title>InvoiceFlow – Invoice & Quotation Manager</title>
  <meta name="description" content="Professional invoice and quotation generator with auto-numbering, item cataloguing, and financial overview." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

</head>
<body>

<!-- ===== SIDEBAR ===== -->

  <div class="sidebar-footer">
    <div class="company-mini" id="sidebar-company-name">Your Company</div>
    <div class="sidebar-version">InvoiceFlow v1.0</div>
  </div>
</aside>

<!-- ===== MAIN ===== -->
<main class="main-content" id="main-content">

  <!-- Top bar -->
  <header class="topbar" id="topbar">
    <div class="topbar-left">
      <button class="icon-btn" id="sidebar-toggle-btn" title="Toggle sidebar" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title" id="page-title">Dashboard</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <!-- View-specific buttons (cleared on each navigation) -->
      <div class="topbar-actions" id="topbar-actions"></div>
      <!-- Persistent controls: always visible, never cleared -->
      <div class="topbar-controls">
        <button class="icon-btn" id="theme-toggle-btn" title="Toggle light/dark mode" aria-label="Toggle theme">
          <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
          <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- View container -->
  <div class="view-container" id="view-container">
    <!-- Views are dynamically injected here -->
  </div>
</main>

<!-- ===== MODAL OVERLAY ===== -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Modal</h2>
      <button class="modal-close" id="modal-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"><!-- injected --></div>
    <div class="modal-footer" id="modal-footer"><!-- injected --></div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast-container" id="toast-container"></div>

<!-- ===== PRINT VIEW ===== -->
<div class="print-area" id="print-area"></div>

<!-- ===== MOBILE SIDEBAR BACKDROP ===== -->
<div id="mobile-nav-overlay"></div>
