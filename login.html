<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0f14" id="metaThemeColor">
<title>Sign in · InvoiceFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* ── Dark theme (default) ── */
  :root {
    --bg-base:       #0d0f14;
    --bg-surface:    #13161e;
    --bg-card:       #1a1e2a;
    --bg-card-hover: #1e2330;
    --bg-input:      #111420;
    --border:        rgba(255,255,255,0.08);
    --border-focus:  rgba(99,102,241,0.6);
    --accent:        #6366f1;
    --accent-2:      #8b5cf6;
    --accent-glow:   rgba(99,102,241,0.25);
    --accent-red:    #ef4444;
    --text-primary:  #f1f5f9;
    --text-secondary:#94a3b8;
    --text-muted:    #475569;
    --shadow-card:   0 24px 80px rgba(0,0,0,0.5);
    --orb-opacity:   0.15;
    --radius-md:     10px;
    --radius-lg:     16px;
    --radius-xl:     22px;
  }

  /* ── Light theme ── */
  body.light {
    --bg-base:       #f0f2f8;
    --bg-surface:    #ffffff;
    --bg-card:       #ffffff;
    --bg-card-hover: #f8f9ff;
    --bg-input:      #f4f5fb;
    --border:        rgba(0,0,0,0.09);
    --border-focus:  rgba(99,102,241,0.5);
    --text-primary:  #1e2330;
    --text-secondary:#4a5568;
    --text-muted:    #9aa5b4;
    --shadow-card:   0 24px 80px rgba(0,0,0,0.08);
    --orb-opacity:   0.08;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html {
    font-size: 15px;
    /* Prevent iOS rubber-band / overscroll revealing white bg */
    height: 100%;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-base);
    color: var(--text-primary);
    min-height: 100vh;
    min-height: 100dvh; /* dynamic viewport height — respects iOS keyboard */
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
    overflow: hidden;
    transition: background 0.3s ease, color 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── Animated background orbs ── */
  body::before,
  body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: var(--orb-opacity);
    z-index: 0;
    pointer-events: none;
    animation: float 20s ease-in-out infinite;
    transition: opacity 0.3s ease;
  }

  body::before {
    width: 500px; height: 500px;
    background: var(--accent);
    top: -120px; right: -80px;
  }

  body::after {
    width: 400px; height: 400px;
    background: var(--accent-2);
    bottom: -100px; left: -60px;
    animation-delay: -10s;
  }

  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25%      { transform: translate(30px, -20px) scale(1.05); }
    50%      { transform: translate(-20px, 15px) scale(0.95); }
    75%      { transform: translate(15px, 25px) scale(1.02); }
  }

  /* ── Login card ── */
  .login-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 40px 36px 36px;
    box-shadow: var(--shadow-card);
    animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Accent top bar */
  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
  }

  /* ── Brand ── */
  .login-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .login-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .login-brand svg { flex-shrink: 0; }

  .login-brand-name {
    font-size: 1.1rem;
    font-weight: 700;
    background: linear-gradient(135deg, #a5b4fc, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* ── Theme toggle ── */
  .theme-btn {
    width: 36px; height: 36px;
    border-radius: var(--radius-md);
    background: var(--bg-input);
    border: 1px solid var(--border);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    transition: background 0.18s, color 0.18s, border-color 0.18s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .theme-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .theme-btn svg { width: 18px; height: 18px; }

  .login-heading {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 6px;
    transition: color 0.3s;
  }

  .login-sub {
    font-size: 0.88rem;
    color: var(--text-secondary);
    margin-bottom: 28px;
    transition: color 0.3s;
  }

  /* ── Form ── */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 18px;
  }

  .form-group label {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    transition: color 0.3s;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap svg.input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    color: var(--text-muted);
    pointer-events: none;
    transition: color 0.18s;
  }

  .input-wrap input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 16px; /* ≥16px prevents iOS auto-zoom */
    padding: 12px 48px 12px 44px;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s, background 0.3s;
    -webkit-appearance: none;
    appearance: none;
  }

  .input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .input-wrap input:focus ~ svg.input-icon {
    color: var(--accent);
  }

  /* Show/hide password toggle */
  .toggle-pw {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    width: 36px; height: 36px;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-md);
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .toggle-pw:hover { color: var(--text-secondary); background: var(--border); }
  .toggle-pw svg { width: 18px; height: 18px; pointer-events: none; }

  /* ── Error message ── */
  .error-msg {
    display: flex;
    align-items: center;
    gap: 8px;
    border-radius: var(--radius-md);
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.25);
    font-size: 0.83rem;
    font-weight: 500;
    color: #f87171;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    padding: 0 14px;
    margin-bottom: 0;
    transition: opacity 0.25s, max-height 0.3s ease, margin-bottom 0.3s, padding 0.3s;
  }

  body.light .error-msg {
    background: rgba(239,68,68,0.08);
    color: #dc2626;
  }

  .error-msg.show {
    opacity: 1;
    max-height: 60px;
    padding: 10px 14px;
    margin-bottom: 18px;
  }

  .error-msg svg {
    width: 16px; height: 16px;
    flex-shrink: 0;
    color: var(--accent-red);
  }

  /* ── Submit button ── */
  .login-btn {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 20px;
    border: none;
    border-radius: var(--radius-md);
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    font-family: inherit;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(99,102,241,0.35);
    transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
    -webkit-tap-highlight-color: transparent;
    /* Larger tap target for mobile */
    min-height: 48px;
  }

  .login-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(99,102,241,0.45);
  }

  .login-btn:active {
    transform: scale(0.98);
  }

  .login-btn:disabled {
    opacity: 0.6;
    cursor: default;
    transform: none;
    box-shadow: 0 4px 14px rgba(99,102,241,0.2);
  }

  /* Spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  .login-btn.loading .spinner { display: block; }
  .login-btn.loading .btn-label { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Footer ── */
  .login-footer {
    margin-top: 24px;
    text-align: center;
    font-size: 0.78rem;
    color: var(--text-muted);
    transition: color 0.3s;
  }

  /* ── Mobile optimizations ── */
  @media (max-width: 480px) {
    body {
      padding: 16px;
      padding: max(16px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(16px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      align-items: flex-start;
      padding-top: max(60px, env(safe-area-inset-top, 60px));
    }

    .login-card {
      padding: 32px 24px 28px;
      border-radius: var(--radius-lg);
      max-width: 100%;
    }

    .login-heading { font-size: 1.3rem; }
    .login-sub { font-size: 0.84rem; margin-bottom: 22px; }

    /* Shrink orbs on mobile */
    body::before { width: 300px; height: 300px; }
    body::after  { width: 250px; height: 250px; }
  }

  /* Handle keyboard open on mobile — keep card visible */
  @media (max-height: 500px) {
    body {
      align-items: flex-start;
      padding-top: 16px;
      overflow-y: auto;
    }
  }

  /* Notch / dynamic island safe areas */
  @supports (padding: env(safe-area-inset-top)) {
    body {
      padding-left: max(24px, env(safe-area-inset-left));
      padding-right: max(24px, env(safe-area-inset-right));
    }
  }

  @media (prefers-reduced-motion: reduce) {
    body::before, body::after { animation: none; }
    .login-card { animation: none; }
    .login-btn, .error-msg, body, .login-card { transition: none; }
  }
</style>
</head>
<body>

  <form class="login-card" id="loginForm" autocomplete="on">
    <!-- Header: brand + theme toggle -->
    <div class="login-header">
      <div class="login-brand">
        <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="8" fill="url(#bg)"/>
          <path d="M7 8h14M7 12h10M7 16h12M7 20h8" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <defs>
            <linearGradient id="bg" x1="0" y1="0" x2="28" y2="28">
              <stop stop-color="#6366f1"/>
              <stop offset="1" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="login-brand-name">InvoiceFlow</span>
      </div>
      <button type="button" class="theme-btn" id="themeToggle" title="Toggle light/dark mode" aria-label="Toggle theme">
        <!-- Moon (shown in dark mode) -->
        <svg id="iconMoon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
        <!-- Sun (shown in light mode) -->
        <svg id="iconSun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>

    <h1 class="login-heading">Welcome back</h1>
    <p class="login-sub">Enter your authenticator code to continue</p>

    <!-- TOTP field -->
    <div class="form-group">
      <label for="totpCode">Authenticator Code</label>
      <div class="input-wrap">
        <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" id="totpCode" name="totpCode" placeholder="000000" style="letter-spacing: 0.5em; text-align: center; font-size: 1.2rem; padding: 12px;" autofocus required>
      </div>
    </div>

    <!-- Error -->
    <div class="error-msg" id="errorMsg">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="15" y1="9" x2="9" y2="15"/>
        <line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <span id="errorText">Invalid code. Try again.</span>
    </div>

    <!-- Submit -->
    <button type="submit" class="login-btn" id="submitBtn">
      <span class="btn-label">Sign in</span>
      <div class="spinner"></div>
    </button>

    <p class="login-footer">Access is restricted to authorized users.</p>
  </form>

  <script>
    /* ── Theme: sync with main app via localStorage('ig_theme') ── */
    const themeToggle = document.getElementById('themeToggle');
    const iconMoon = document.getElementById('iconMoon');
    const iconSun  = document.getElementById('iconSun');
    const metaTheme = document.getElementById('metaThemeColor');

    function applyTheme(light) {
      document.body.classList.toggle('light', light);
      iconMoon.style.display = light ? 'none' : '';
      iconSun.style.display  = light ? ''     : 'none';
      localStorage.setItem('ig_theme', light ? 'light' : 'dark');
      if (metaTheme) metaTheme.content = light ? '#f0f2f8' : '#0d0f14';
    }

    // Read saved preference on load
    applyTheme(localStorage.getItem('ig_theme') === 'light');

    themeToggle.addEventListener('click', () => {
      applyTheme(!document.body.classList.contains('light'));
    });

    /* ── Show / hide password removed ── */

    /* ── Login form ── */
    const form      = document.getElementById('loginForm');
    const errorMsg  = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const submitBtn = document.getElementById('submitBtn');
    const totpInput = document.getElementById('totpCode');

    const params  = new URLSearchParams(window.location.search);
    const nextUrl = params.get('next') || '/';

    // Auto-submit when exactly 6 digits are typed
    totpInput.addEventListener('input', () => {
      if (totpInput.value.length === 6) {
        form.dispatchEvent(new Event('submit'));
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('show');
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ totpCode: totpInput.value })
        });

        if (res.ok) {
          window.location.href = nextUrl;
          return;
        }

        const data = await res.json().catch(() => ({}));
        errorText.textContent = res.status === 429
          ? 'Too many attempts. Please wait a few minutes.'
          : (data.error || 'Invalid code. Try again.');
        errorMsg.classList.add('show');
        totpInput.value = '';
        totpInput.focus();
      } catch (err) {
        errorText.textContent = 'Something went wrong. Please try again.';
        errorMsg.classList.add('show');
      } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
      }
    });
  </script>
</body>
</html>
